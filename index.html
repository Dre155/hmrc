<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in – EE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .ee-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 34px;
      margin: -78px auto 28px;
    }

    .ee-circle {
      width: 34px;
      height: 34px;
      background-color: #007b8a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      z-index: 1;
      margin-bottom: -4px;
    }

    .ee-circle:last-child { z-index: 0; }

    .ee-circle svg {
      width: 11px;
      height: 16px;
    }

    .card {
      background: #fff;
      border: 1.5px solid #aaa;
      border-radius: 14px;
      padding: 124px 68px 137px;
      width: 100%;
      max-width: 463px;
      position: relative;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #007b8a;
      margin-bottom: 20px;
      width: 70%;
      margin-left: auto;
      margin-right: auto;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
      width: 70%;
      margin-left: auto;
      margin-right: auto;
    }

    input[type="text"] {
      width: 70%;
      display: block;
      margin: 0 auto;
      height: 48px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 15px;
      color: #222;
      outline: none;
      background: #f5f5f5;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #007b8a; }

    .btn-next {
      width: 70%;
      display: block;
      margin: 16px auto 0;
      height: 48px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-next:hover { background: #333; }

    .divider {
      margin: 32px auto 10px;
      font-size: 16px;
      font-weight: 700;
      color: #444;
      width: 70%;
    }

    .btn-create {
      width: 70%;
      display: block;
      margin: 0 auto;
      height: 48px;
      background: #fff;
      color: #111;
      border: 2px solid #111;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-create:hover { background: #111; color: #fff; }

    .cancel-wrapper {
      position: absolute;
      bottom: 32px;
      left: 68px;
    }

    .cancel {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      color: #333;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
    }

    .cancel:hover { color: #007b8a; }

    @media (max-width: 640px) {
      body { align-items: flex-start; padding: 48px 24px; }

      .card {
        border: none;
        border-radius: 0;
        padding: 0;
        max-width: 100%;
      }

      .ee-logo { margin: 0 auto 28px; align-items: center; }

      input[type="text"],
      .btn-next,
      .btn-create { width: 75%; }

      h1 { width: 75%; margin-left: auto; margin-right: auto; }

      label { width: 75%; margin-left: auto; margin-right: auto; }

      .divider { width: 75%; margin-left: auto; margin-right: auto; }

      .cancel-wrapper {
        position: static;
        margin-top: 36px;
        width: 75%;
        margin-left: auto;
        margin-right: auto;
        display: flex;
        justify-content: flex-start;
      }
    }

    @media (max-width: 400px) {
      .ee-circle { width: 26px; height: 26px; }
      .ee-circle svg { width: 8px; height: 12px; }
      h1 { font-size: 20px; }
      input[type="text"], .btn-next, .btn-create { height: 46px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="ee-logo">
      <div class="ee-circle">
        <svg viewBox="0 0 56 84" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="14" height="84" rx="1" fill="white"/>
          <rect x="0" y="0" width="56" height="14" rx="1" fill="white"/>
          <rect x="0" y="35" width="44" height="14" rx="1" fill="white"/>
          <rect x="0" y="70" width="56" height="14" rx="1" fill="white"/>
        </svg>
      </div>
      <div class="ee-circle">
        <svg viewBox="0 0 56 84" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="14" height="84" rx="1" fill="white"/>
          <rect x="0" y="0" width="56" height="14" rx="1" fill="white"/>
          <rect x="0" y="35" width="44" height="14" rx="1" fill="white"/>
          <rect x="0" y="70" width="56" height="14" rx="1" fill="white"/>
        </svg>
      </div>
    </div>

    <h1>Log in</h1>

    <label for="email">Email or username</label>
    <input type="text" id="email" name="email" autocomplete="username"/>

    <button onclick="handleNext()" class="btn-next">Next</button>
    <script>
        function handleNext() {
          const email = document.getElementById('email').value;
          
      
          sessionStorage.setItem('email', email);
          window.location.href = 'login.html';
        }
      </script>

    <p class="divider">Don't have an account?</p>

    <button class="btn-create">Create account</button>

    <div class="cancel-wrapper">
      <button class="cancel">Cancel</button>
    </div>

  </div>
</body>
</html>
